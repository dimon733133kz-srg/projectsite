<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лекции</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .quiz-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 50, 0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .quiz-overlay.active { display: flex; }

    .quiz-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .quiz-counter {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }

    .quiz-timer {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fef3c7;
      border: 1.5px solid #fbbf24;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 15px;
      font-weight: 700;
      color: #92400e;
      transition: background 0.3s, border-color 0.3s;
    }

    .quiz-timer.urgent {
      background: #fee2e2;
      border-color: #f87171;
      color: #991b1b;
    }

    .quiz-question {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.5;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-option {
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      font-size: 15px;
      color: #1e293b;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-weight: 500;
    }

    .quiz-option:hover { background: #f5f3ff; border-color: #a78bfa; transform: translateX(4px); }
    .quiz-option:active { transform: scale(0.98); }

    .quiz-progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--navy), var(--purple));
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* Результаты */
    .quiz-results {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .quiz-results-title {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
    }

    .quiz-results-score {
      text-align: center;
      font-size: 48px;
      font-weight: 800;
      color: var(--purple);
    }

    .quiz-results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quiz-stat-card {
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .quiz-stat-card.correct { background: #e8fdf5; border: 1.5px solid #34d399; }
    .quiz-stat-card.wrong { background: #fff5f5; border: 1.5px solid #fca5a5; }
    .quiz-stat-card.skipped { background: #fefce8; border: 1.5px solid #fbbf24; }
    .quiz-stat-card.total { background: #f0f4ff; border: 1.5px solid #a5b4fc; }

    .quiz-stat-label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .quiz-stat-value { font-size: 24px; font-weight: 800; color: #1e293b; }

    .quiz-reward {
      text-align: center;
      background: #fefce8;
      border: 2px solid #facc15;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #92400e;
    }

    .quiz-reward-amount { font-size: 28px; color: #ca8a04; }

    .quiz-close-btn {
      padding: 14px;
      background: linear-gradient(to right, var(--navy), var(--purple));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .quiz-close-btn:hover { opacity: 0.88; }

    .start-test-btn {
      margin: 0 40px 40px;
      padding: 14px;
      background: linear-gradient(to right, var(--emerald), #059669);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .start-test-btn:hover { opacity: 0.88; }
    .start-test-btn:active { transform: scale(0.98); }

    @media (max-width: 600px) {
      .quiz-box { padding: 24px 18px; margin: 16px; }
      .quiz-question { font-size: 16px; }
      .quiz-results-score { font-size: 36px; }
      .quiz-results-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="main.html">
        <img src="logo.png" alt="Логотип">
      </a>
    </div>

    <div class="header-right">
      <div class="stat-badge wins">
        <img src="icons/wins.png" alt="Победы">
        <span id="wins-count">0</span>
      </div>
      <div class="stat-badge streak">
        <img src="icons/streak.png" alt="Стрик">
        <span id="streak-count">0</span>
      </div>

      <div class="profile" id="profile-btn" onclick="toggleDropdown(event)">
        <div class="profile-icon">
          <img src="icons/profile-default.png" alt="Профиль" id="profile-avatar-img">
        </div>
        <span class="profile-name" id="profile-name">Загрузка...</span>
        <span class="profile-arrow">▼</span>

        <div class="dropdown">
          <a href="#">⚙️ Настройки</a>
          <div class="divider"></div>
          <a href="#" class="logout" onclick="logout()">🚪 Выйти из аккаунта</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="lectures-layout">

      <div class="lectures-sidebar">
        <div class="lectures-sidebar-header">
          Лекции
          <a href="main.html">← Назад</a>
        </div>
        <div id="sections-list">
          <div class="lecture-placeholder" style="padding: 30px; font-size: 13px; color: #94a3b8;">
            Загрузка...
          </div>
        </div>
      </div>

      <div class="lecture-content" id="lecture-content">
        <div class="lecture-placeholder">
          <div class="lecture-placeholder-icon">📖</div>
          <div class="lecture-placeholder-text">Выбери лекцию из меню слева</div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Петряков Дмитрий</span></span>
      <span>Разработчик: <span class="credit-person">Дарханбаев Султан</span></span>
    </div>
    <div>©2026 Все права защищены.</div>
  </footer>

  <!-- КВИЗ ОВЕРЛЕЙ -->
  <div class="quiz-overlay" id="quiz-overlay">
    <div class="quiz-box" id="quiz-box">
      <!-- Содержимое рендерится через JS -->
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let activeLectureBtn = null
    let currentUserId = null
    let currentMoney = 0

    // ===== КВИЗ =====
    let quizQuestions = []
    let quizOrder = []
    let quizIndex = 0
    let quizCorrect = 0
    let quizWrong = 0
    let quizSkipped = 0
    let quizTimer = null

    function shuffle(arr) {
      const a = [...arr]
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]]
      }
      return a
    }

    function startQuiz(questions) {
      quizQuestions = questions
      quizOrder = shuffle(questions.map((_, i) => i))
      quizIndex = 0
      quizCorrect = 0
      quizWrong = 0
      quizSkipped = 0
      document.getElementById('quiz-overlay').classList.add('active')
      showQuestion()
    }

    function showQuestion() {
      if (quizIndex >= quizOrder.length) {
        showResults()
        return
      }

      clearInterval(quizTimer)

      const q = quizQuestions[quizOrder[quizIndex]]
      const total = quizOrder.length
      const current = quizIndex + 1
      let timeLeft = 30

      const shuffledOptions = shuffle(q.options.map((opt, i) => ({ text: opt, idx: i })))

      document.getElementById('quiz-box').innerHTML = `
        <div class="quiz-top">
          <div class="quiz-counter">Вопрос ${current} из ${total}</div>
          <div class="quiz-timer" id="quiz-timer">⏱ ${timeLeft}с</div>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" style="width: ${(current / total) * 100}%"></div>
        </div>
        <div class="quiz-question">${q.question}</div>
        <div class="quiz-options">
          ${shuffledOptions.map(opt => `
            <button class="quiz-option" onclick="answerQuestion(${opt.idx}, ${q.answer})">
              ${opt.text}
            </button>`).join('')}
        </div>`

      quizTimer = setInterval(() => {
        timeLeft--
        const timerEl = document.getElementById('quiz-timer')
        if (!timerEl) { clearInterval(quizTimer); return }
        timerEl.textContent = `⏱ ${timeLeft}с`
        if (timeLeft <= 10) timerEl.classList.add('urgent')
        if (timeLeft <= 0) {
          clearInterval(quizTimer)
          quizSkipped++
          quizIndex++
          showQuestion()
        }
      }, 1000)
    }

    function answerQuestion(selected, correct) {
      clearInterval(quizTimer)
      if (selected === correct) quizCorrect++
      else quizWrong++
      quizIndex++
      showQuestion()
    }

    async function showResults() {
      const total = quizOrder.length
      const percent = total > 0 ? Math.round((quizCorrect / total) * 1000) / 10 : 0

      let reward = quizCorrect * 10
      const isAllCorrect = quizCorrect === total && quizSkipped === 0 && quizWrong === 0
      if (isAllCorrect) reward *= 2

      // Сохраняем деньги
      if (currentUserId) {
        const newMoney = currentMoney + reward
        await client.from('profiles').update({ money: newMoney }).eq('id', currentUserId)
        currentMoney = newMoney
      }

      document.getElementById('quiz-box').innerHTML = `
        <div class="quiz-results">
          <div class="quiz-results-title">Результаты теста</div>
          <div class="quiz-results-score">${percent}%</div>
          <div class="quiz-results-grid">
            <div class="quiz-stat-card total">
              <div class="quiz-stat-label">Всего вопросов</div>
              <div class="quiz-stat-value">${total}</div>
            </div>
            <div class="quiz-stat-card correct">
              <div class="quiz-stat-label">Правильно</div>
              <div class="quiz-stat-value">${quizCorrect}</div>
            </div>
            <div class="quiz-stat-card wrong">
              <div class="quiz-stat-label">Неправильно</div>
              <div class="quiz-stat-value">${quizWrong}</div>
            </div>
            <div class="quiz-stat-card skipped">
              <div class="quiz-stat-label">Пропущено</div>
              <div class="quiz-stat-value">${quizSkipped}</div>
            </div>
          </div>
          <div class="quiz-reward">
            ${isAllCorrect ? '🎉 Все правильно! Бонус x2!' : '💰 Награда'}
            <div class="quiz-reward-amount">+${reward} 🪙</div>
          </div>
          <button class="quiz-close-btn" onclick="closeQuiz()">Закрыть</button>
        </div>`
    }

    function closeQuiz() {
      clearInterval(quizTimer)
      document.getElementById('quiz-overlay').classList.remove('active')
    }

    // ===== ИНИТ =====
    async function init() {
      const { data: { session } } = await client.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }

      currentUserId = session.user.id

      const { data, error } = await client
        .from('profiles')
        .select('name, profile_bg, profile_avatar, wins, win_streak, money')
        .eq('id', session.user.id)
        .single()

      if (error || !data) { window.location.href = 'index.html'; return }

      currentMoney = data.money ?? 0

      document.getElementById('profile-name').textContent = data.name
      document.getElementById('wins-count').textContent = data.wins ?? 0
      document.getElementById('streak-count').textContent = data.win_streak ?? 0

      if (data.profile_avatar) {
        document.getElementById('profile-avatar-img').src = data.profile_avatar
      }

      if (data.profile_bg) {
        const btn = document.getElementById('profile-btn')
        btn.style.backgroundImage = `url('${data.profile_bg}')`
        btn.classList.add('has-bg')
      }

      await loadSections()
    }

    async function loadSections() {
      const { data: sections, error } = await client
        .from('sections')
        .select('id, title, order')
        .order('order', { ascending: true })

      if (error || !sections || sections.length === 0) {
        document.getElementById('sections-list').innerHTML =
          '<div style="padding:20px;font-size:13px;color:#94a3b8;">Разделов пока нет</div>'
        return
      }

      const { data: lectures } = await client
        .from('lectures')
        .select('id, title, section_id, order')
        .order('order', { ascending: true })

      const list = document.getElementById('sections-list')
      list.innerHTML = ''

      sections.forEach(section => {
        const sectionLectures = lectures ? lectures.filter(l => l.section_id === section.id) : []

        const sectionEl = document.createElement('div')
        sectionEl.className = 'section-item'
        sectionEl.innerHTML = `
          <button class="section-toggle" onclick="toggleSection(this)">
            ${section.title}
            <span class="section-arrow">▼</span>
          </button>
          <div class="section-lectures">
            ${sectionLectures.length === 0
              ? '<div style="padding:10px 20px 10px 36px;font-size:13px;color:#94a3b8;">Лекций пока нет</div>'
              : sectionLectures.map(l => `
                <button class="lecture-btn" onclick="loadLecture('${l.id}', this)">
                  ${l.title}
                </button>`).join('')}
          </div>`
        list.appendChild(sectionEl)
      })
    }

    function toggleSection(btn) {
      btn.classList.toggle('open')
      btn.nextElementSibling.classList.toggle('open')
    }

    async function loadLecture(lectureId, btn) {
      if (activeLectureBtn) activeLectureBtn.classList.remove('active')
      activeLectureBtn = btn
      btn.classList.add('active')

      const content = document.getElementById('lecture-content')
      content.innerHTML = '<div class="lecture-placeholder"><div class="lecture-placeholder-text">Загрузка...</div></div>'

      const { data: lecture, error } = await client
        .from('lectures')
        .select('file_url, title')
        .eq('id', lectureId)
        .single()

      if (error || !lecture) {
        content.innerHTML = '<div class="lecture-placeholder"><div class="lecture-placeholder-text">Ошибка загрузки</div></div>'
        return
      }

      try {
        const response = await fetch(lecture.file_url)
        const json = await response.json()
        renderLecture(json)
      } catch (e) {
        content.innerHTML = '<div class="lecture-placeholder"><div class="lecture-placeholder-text">Ошибка чтения файла</div></div>'
      }
    }

    function renderLecture(data) {
      const content = document.getElementById('lecture-content')

      let blocksHtml = ''
      data.content.forEach(block => {
        if (block.type === 'heading') {
          blocksHtml += `<div class="lecture-block-heading">${block.text}</div>`
        } else if (block.type === 'paragraph') {
          blocksHtml += `<div class="lecture-block-paragraph">${block.text}</div>`
        } else if (block.type === 'code') {
          blocksHtml += `<pre class="lecture-block-code">${block.text}</pre>`
        } else if (block.type === 'image') {
          blocksHtml += `<img class="lecture-block-image" src="${block.src}" alt="${block.alt || ''}">`
        }
      })

      const hasQuestions = data.questions && data.questions.length > 0

      content.innerHTML = `
        <div class="lecture-body">
          <h1>${data.title}</h1>
          ${data.description ? `<div class="lecture-description">${data.description}</div>` : ''}
          ${blocksHtml}
        </div>
        ${hasQuestions ? `
          <button class="start-test-btn" onclick='startQuiz(${JSON.stringify(data.questions)})'>
            🧪 Начать тест (${data.questions.length} вопросов)
          </button>` : ''}`
    }

    function toggleDropdown(e) {
      e.stopPropagation()
      document.getElementById('profile-btn').classList.toggle('open')
    }

    document.addEventListener('click', function(e) {
      const profile = document.getElementById('profile-btn')
      if (profile && !profile.contains(e.target)) profile.classList.remove('open')
    })

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>

</body>
</html>
