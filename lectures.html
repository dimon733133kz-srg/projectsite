<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лекции - CodeLearn</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        #profile-btn { height: 45px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; border-radius: 12px; background: var(--bg-primary); border: 1px solid var(--border-color); cursor: pointer; background-size: cover; background-position: center; }
        .profile-avatar { width: 35px; height: 35px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { display: flex; flex-direction: column; justify-content: center; line-height: 1.2; }
        #profile-name { font-weight: 600; font-size: 14px; }
        .profile-stats { font-size: 11px; display: flex; gap: 8px; opacity: 0.8; }
        .lecture-btn.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed !important; pointer-events: none; }
        body.dark .modal-box { background: #1e293b !important; color: #f8fafc !important; border: 1px solid #334155; }
        body.dark .modal-label { color: #94a3b8; }
        body.dark #lecture-title-input, body.dark #section-select, body.dark #json-editor { background: #0f172a; color: #f1f5f9; border: 1px solid #334155; }
        #json-editor { width: 100%; min-height: 300px; margin-top: 10px; font-family: monospace; padding: 10px; border-radius: 8px; resize: vertical; display: none; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="main.html" class="logo">CodeLearn</a>
    </div>
    <div class="header-right">
        <div class="profile-dropdown" id="profile-btn" onclick="toggleDropdown(event)">
            <div class="profile-avatar">
                <img src="icons/default-avatar.png" id="profile-avatar-img">
            </div>
            <div class="profile-info">
                <span id="profile-name">Загрузка...</span>
                <div class="profile-stats">
                    <span>🏆 <span id="wins-count">0</span></span>
                    <span>🔥 <span id="streak-count">0</span></span>
                </div>
            </div>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="profile.html" class="dropdown-item">👤 Профиль</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()" class="dropdown-item logout-btn">🚪 Выйти</button>
            </div>
        </div>
    </div>
</header>

<main class="lectures-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Курс обучения</h3>
            <button class="admin-only-btn" id="add-lecture-btn" onclick="openAddModal()" style="display:none">➕</button>
        </div>
        <div id="sections-list"></div>
        <button class="teacher-mode-btn" id="teacher-sidebar-btn" onclick="openPasswordModal()">🔓 Режим преподавателя</button>
    </aside>

    <section class="content-area" id="lecture-content">
        <div class="lecture-placeholder">
            <div class="lecture-placeholder-text">Выберите лекцию из списка слева, чтобы начать обучение</div>
        </div>
    </section>
</main>

<div class="modal-overlay" id="password-modal">
    <div class="modal-box">
        <div class="modal-title">Вход для преподавателя</div>
        <input type="password" id="teacher-pass-input" placeholder="Введите пароль">
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closePasswordModal()">Отмена</button>
            <button class="modal-btn confirm" onclick="checkTeacherPassword()">Войти</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="add-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title-text">➕ Добавить лекцию</div>
        <div class="modal-label">Название</div>
        <input type="text" id="lecture-title-input">
        <div class="modal-label">Раздел</div>
        <select id="section-select"></select>
        <div class="file-drop-zone" id="file-drop-zone" onclick="document.getElementById('json-file-input').click()">
            📄 Нажмите для выбора .json
        </div>
        <input type="file" id="json-file-input" accept=".json" style="display:none" onchange="onFileSelected()">
        <div id="preview-wrap" style="display:none"></div>
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closeAddModal()">Отмена</button>
            <button class="modal-btn confirm" id="add-confirm-btn" onclick="addLecture()">Сохранить</button>
        </div>
    </div>
</div>

<div class="quiz-overlay" id="quiz-overlay">
    <div class="quiz-box" id="quiz-box"></div>
</div>

<script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'
    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let currentUserId, currentMoney, teacherPassword, isTeacher = false, editingLectureId = null, selectedJsonFile = null, userProgress = new Set(), allSections = []
    let quizQuestions, quizLectureId, quizOrder, quizIndex, quizCorrect, quizWrong, quizSkipped, quizTimer

    async function init() {
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark')
        const { data: { session } } = await client.auth.getSession()
        if (!session) { window.location.href = 'index.html'; return }
        currentUserId = session.user.id
        const { data: profile } = await client.from('profiles').select('*').eq('id', currentUserId).single()
        if (profile) {
            currentMoney = profile.money ?? 0
            if (document.getElementById('profile-name')) document.getElementById('profile-name').textContent = profile.name
            if (document.getElementById('wins-count')) document.getElementById('wins-count').textContent = profile.wins ?? 0
            if (document.getElementById('streak-count')) document.getElementById('streak-count').textContent = profile.win_streak ?? 0
            if (document.getElementById('profile-avatar-img') && profile.profile_avatar) document.getElementById('profile-avatar-img').src = profile.profile_avatar
            if (profile.profile_bg) {
                const btn = document.getElementById('profile-btn')
                btn.style.backgroundImage = `url('${profile.profile_bg}')`
                btn.classList.add('has-bg')
            }
        }
        const { data: results } = await client.from('quiz_results').select('lecture_id').eq('user_id', currentUserId)
        userProgress = new Set(results?.map(r => r.lecture_id) || [])
        await loadTeacherPassword()
        await loadSections()
    }

    async function loadSections() {
        const { data: sections } = await client.from('sections').select('*').order('order')
        const { data: lectures } = await client.from('lectures').select('*').order('order')
        allSections = sections || []
        const list = document.getElementById('sections-list')
        list.innerHTML = ''
        let canOpenNext = true
        sections.forEach(s => {
            const sLecs = lectures.filter(l => l.section_id === s.id)
            let lecsHtml = ''
            sLecs.forEach(l => {
                const isPassed = userProgress.has(l.id)
                const isLocked = !canOpenNext && !isTeacher
                lecsHtml += `<button class="lecture-btn ${isLocked ? 'locked' : ''}" onclick="${isLocked ? '' : `loadLecture('${l.id}', this)`}">
                    ${isLocked ? '🔒 ' : ''}<span style="flex:1">${l.title}</span>${isPassed ? '✔' : ''}
                    ${isTeacher ? `<span onclick="event.stopPropagation();prepareEdit('${l.id}')">✏️</span><span onclick="event.stopPropagation();deleteLecture('${l.id}')">🗑️</span>` : ''}
                </button>`
                if (!isPassed) canOpenNext = false
            })
            list.innerHTML += `<div class="section-item"><button class="section-toggle open" onclick="toggleSection(this)">${s.title}</button><div class="section-lectures open">${lecsHtml}</div></div>`
        })
    }

    async function loadLecture(id, btn) {
        document.querySelectorAll('.lecture-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        const { data: lec } = await client.from('lectures').select('*').eq('id', id).single()
        const res = await fetch(lec.file_url); const json = await res.json()
        const { data: result } = await client.from('quiz_results').select('*').eq('user_id', currentUserId).eq('lecture_id', id).single()
        renderLecture(json, id, result)
    }

    function renderLecture(data, id, res) {
        let content = `<h1>${data.title}</h1>`
        data.content.forEach(b => {
            if (b.type === 'heading') content += `<h2>${b.text}</h2>`
            else if (b.type === 'paragraph') content += `<p>${b.text}</p>`
            else if (b.type === 'code') content += `<pre>${b.text}</pre>`
            else if (b.type === 'image') content += `<img src="${b.src}" style="max-width:100%">`
        })
        content += `<button class="start-test-btn" onclick="startQuiz(${JSON.stringify(data.questions).replace(/"/g, '&quot;')}, '${id}')">${res ? '📊 Результат: ' + res.percent + '%' : '🧪 Начать тест'}</button>`
        document.getElementById('lecture-content').innerHTML = content
    }

    function startQuiz(q, id) {
        quizQuestions = q; quizLectureId = id; quizIndex = 0; quizCorrect = 0; quizWrong = 0; quizSkipped = 0
        quizOrder = Array.from({length: q.length}, (_, i) => i).sort(() => Math.random() - 0.5)
        document.getElementById('quiz-overlay').classList.add('active'); showQuestion()
    }

    function showQuestion() {
        if (quizIndex >= quizOrder.length) return showResults()
        const q = quizQuestions[quizOrder[quizIndex]]; let time = 20
        document.getElementById('quiz-box').innerHTML = `<div>${quizIndex + 1}/${quizOrder.length} <span id="q-timer">20</span></div><h3>${q.question}</h3>`
        q.options.forEach((opt, i) => {
            document.getElementById('quiz-box').innerHTML += `<button class="quiz-option" onclick="answer(${i}, ${q.answer})">${opt}</button>`
        })
        clearInterval(quizTimer)
        quizTimer = setInterval(() => {
            time--; document.getElementById('q-timer').textContent = time
            if (time <= 0) { clearInterval(quizTimer); quizSkipped++; quizIndex++; showQuestion() }
        }, 1000)
    }

    function answer(s, c) { clearInterval(quizTimer); if (s === c) quizCorrect++; else quizWrong++; quizIndex++; showQuestion() }

    async function showResults() {
        const p = Math.round((quizCorrect / quizQuestions.length) * 100); let r = quizCorrect * 10
        await client.from('profiles').update({ money: currentMoney + r }).eq('id', currentUserId)
        await client.from('quiz_results').insert({ user_id: currentUserId, lecture_id: quizLectureId, percent: p, reward: r })
        document.getElementById('quiz-box').innerHTML = `<h2>Итог: ${p}%</h2><p>Монеты: +${r}</p><button onclick="location.reload()">Закрыть</button>`
    }

    async function prepareEdit(id) {
        editingLectureId = id; const { data: lec } = await client.from('lectures').select('*').eq('id', id).single()
        const res = await fetch(lec.file_url); const json = await res.json()
        openAddModal(); document.getElementById('modal-title-text').textContent = '📝 Редактор'
        document.getElementById('lecture-title-input').value = lec.title; document.getElementById('section-select').value = lec.section_id
        document.getElementById('file-drop-zone').style.display = 'none'
        let ed = document.getElementById('json-editor')
        if (!ed) { ed = document.createElement('textarea'); ed.id = 'json-editor'; document.getElementById('preview-wrap').before(ed) }
        ed.style.display = 'block'; ed.value = JSON.stringify(json, null, 2)
    }

    async function addLecture() {
        const t = document.getElementById('lecture-title-input').value, s = document.getElementById('section-select').value, ed = document.getElementById('json-editor')
        let url = null
        if (editingLectureId && ed?.style.display !== 'none') {
            const blob = new Blob([ed.value], {type: 'application/json'}); const fn = `upd_${Date.now()}.json`
            await client.storage.from('lectures').upload(fn, blob); url = client.storage.from('lectures').getPublicUrl(fn).data.publicUrl
        } else if (selectedJsonFile) {
            const fn = `${Date.now()}_${selectedJsonFile.name}`
            await client.storage.from('lectures').upload(fn, selectedJsonFile); url = client.storage.from('lectures').getPublicUrl(fn).data.publicUrl
        }
        if (editingLectureId) await client.from('lectures').update({ title: t, section_id: s, ...(url && {file_url: url}) }).eq('id', editingLectureId)
        else await client.from('lectures').insert({ title: t, section_id: s, file_url: url, order: 99 })
        location.reload()
    }

    async function deleteLecture(id) { if (confirm('Удалить?')) { await client.from('lectures').delete().eq('id', id); loadSections() } }
    async function loadTeacherPassword() { const { data } = await client.storage.from('config').download('teacher_password.txt'); if (data) teacherPassword = (await data.text()).trim() }
    function checkTeacherPassword() { if (document.getElementById('teacher-pass-input').value === teacherPassword) { isTeacher = true; closePasswordModal(); document.getElementById('add-lecture-btn').style.display = 'block'; loadSections() } }
    function toggleSection(b) { b.nextElementSibling.classList.toggle('open') }
    function toggleDropdown(e) { e.stopPropagation(); document.getElementById('profile-btn').classList.toggle('open') }
    function openPasswordModal() { document.getElementById('password-modal').classList.add('active') }
    function closePasswordModal() { document.getElementById('password-modal').classList.remove('active') }
    function openAddModal() { document.getElementById('add-modal').classList.add('active'); const sel = document.getElementById('section-select'); sel.innerHTML = allSections.map(s => `<option value="${s.id}">${s.title}</option>`).join('') }
    function closeAddModal() { document.getElementById('add-modal').classList.remove('active'); editingLectureId = null }
    function onFileSelected() { selectedJsonFile = document.getElementById('json-file-input').files[0] }
    async function logout() { await client.auth.signOut(); window.location.href = 'index.html' }

    init()
</script>
</body>
</html>
