<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лекции</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .lecture-btn.locked { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .lecture-btn.locked::before { content: "🔒 "; }
    .quiz-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .quiz-container { background: #1e1e1e; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; text-align: center; }
    .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #333; border: 1px solid #444; color: white; cursor: pointer; border-radius: 6px; }
    .option-btn:hover { background: #444; }
  </style>
</head>
<body>

<header>
  <div class="logo"><a href="main.html"><img src="logo.png" alt="Logo"></a></div>
  <div class="header-right">
    <div class="profile" onclick="toggleDropdown(event)">
      <span id="profile-name">Загрузка...</span>
      <div class="dropdown"><a href="#" onclick="logout()">🚪 Выйти</a></div>
    </div>
  </div>
</header>

<div class="lessons-bar" id="lessons-bar"></div>

<main class="lectures-layout">
  <div class="lectures-sidebar">
    <div id="sections-list"></div>
    <button class="admin-access-btn" onclick="openPasswordModal()">🔑 Админ</button>
    <button id="admin-panel-btn" style="display:none;" onclick="openAdminModal()">🛠️ Управление</button>
  </div>

  <div class="lecture-content" id="lecture-content">
    <div class="lecture-placeholder">Выберите лекцию</div>
  </div>
</main>

<div class="modal-overlay" id="admin-modal">
  <div class="modal-box">
    <h3>Управление лекциями</h3>
    <select id="adm-lesson-select" onchange="loadAdmSections()"></select>
    <select id="adm-section-select" onchange="loadAdmLectures()"></select>
    <input type="text" id="new-section-name" placeholder="Имя нового раздела (если нужно)">
    <hr>
    <select id="adm-lecture-select" onchange="fillLecData()"></select>
    <input type="text" id="lec-title" placeholder="Название лекции">
    <input type="number" id="lec-order" placeholder="Порядок (Order)">
    <textarea id="lec-json-edit" placeholder="JSON контент здесь..."></textarea>
    <input type="file" id="lec-file-input" accept=".json">
    
    <div class="modal-btns">
      <button onclick="saveLecture()" style="background: #22c55e;">Сохранить/Создать</button>
      <button onclick="deleteLecture()" style="background: #ef4444;">Удалить</button>
      <button onclick="closeAdminModal()">Закрыть</button>
    </div>
  </div>
</div>

<div id="quiz-modal" class="quiz-modal">
  <div class="quiz-container" id="quiz-container"></div>
</div>

<script>
  const SUPABASE_URL = 'ТВОЙ_URL'
  const SUPABASE_KEY = 'ТВОЙ_KEY'
  const { createClient } = supabase
  const client = createClient(SUPABASE_URL, SUPABASE_KEY)

  let curUser = null, userResults = [], allLecs = [], allSecs = [];
  let activeLecId = null;

  async function init() {
    const { data: { session } } = await client.auth.getSession()
    if (!session) return window.location.href = 'index.html'
    curUser = session.user.id
    
    await refreshData()
    renderLessons()
  }

  async function refreshData() {
    const [l, s, res] = await Promise.all([
      client.from('lectures').select('*').order('order'),
      client.from('sections').select('*').order('order'),
      client.from('quiz_results').select('lecture_id').eq('user_id', curUser)
    ])
    allLecs = l.data; allSecs = s.data; userResults = res.data.map(r => r.lecture_id)
  }

  function renderLessons() {
    const list = document.getElementById('sections-list');
    list.innerHTML = '';

    let lastPassed = true; 
    
    allSecs.forEach(sec => {
      const lecs = allLecs.filter(le => le.section_id === sec.id);
      let secHtml = `<div class="sec-title">${sec.title}</div>`;
      
      lecs.forEach((le, index) => {
        const isPassed = userResults.includes(le.id);
        const isLocked = !lastPassed; 
        
        secHtml += `
          <button class="lecture-btn ${isPassed ? 'passed' : ''} ${isLocked ? 'locked' : ''}" 
                  onclick="loadLecContent('${le.id}')">
            ${le.title}
          </button>`;
        
        lastPassed = isPassed;
      });
      list.innerHTML += secHtml;
    });
  }

  async function loadLecContent(id) {
    activeLecId = id;
    const lec = allLecs.find(l => l.id == id);
    const res = await fetch(lec.file_url);
    const data = await res.json();
    
    let html = `<h1>${data.title}</h1>`;
    data.content.forEach(c => {
      if(c.type === 'heading') html += `<h3>${c.text}</h3>`;
      if(c.type === 'paragraph') html += `<p>${c.text}</p>`;
      if(c.type === 'code') html += `<pre>${c.text}</pre>`;
    });
    
    if(data.questions) {
      html += `<button class="start-btn" onclick='runQuiz(${JSON.stringify(data.questions)})'>Начать тест</button>`;
    }
    document.getElementById('lecture-content').innerHTML = html;
  }
  
  function runQuiz(questions) {
    const modal = document.getElementById('quiz-modal');
    const container = document.getElementById('quiz-container');
    modal.style.display = 'flex';
    
    let currentQ = 0;
    let score = 0;
    const shuffled = questions.sort(() => 0.5 - Math.random());

    function showQuestion() {
      if(currentQ >= shuffled.length) return finish();
      const q = shuffled[currentQ];
      container.innerHTML = `<h3>${q.question}</h3>`;
      q.options.forEach((opt, i) => {
        container.innerHTML += `<button class="option-btn" onclick="check(${i}, ${q.answer})">${opt}</button>`;
      });
    }

    window.check = (idx, correct) => {
      if(idx === correct) score++;
      currentQ++;
      showQuestion();
    }

    async function finish() {
      container.innerHTML = `<h2>Результат: ${score}/${shuffled.length}</h2>`;
      if(score === shuffled.length) {
        await client.from('quiz_results').upsert({ user_id: curUser, lecture_id: activeLecId });
        container.innerHTML += `<p>Успех! Лекция пройдена.</p>`;
      }
      container.innerHTML += `<button onclick="location.reload()">Закрыть</button>`;
    }
    showQuestion();
  }

  async function saveLecture() {
    const title = document.getElementById('lec-title').value;
    const order = document.getElementById('lec-order').value;
    const file = document.getElementById('lec-file-input').files[0];
    const rawJson = document.getElementById('lec-json-edit').value;
    
    let url = "";
    if(file) {
      const name = `lec_${Date.now()}.json`;
      await client.storage.from('lectures').upload(name, file);
      url = client.storage.from('lectures').getPublicUrl(name).data.publicUrl;
    } else if(rawJson) {
      const name = `edit_${Date.now()}.json`;
      await client.storage.from('lectures').upload(name, new Blob([rawJson], {type:'application/json'}));
      url = client.storage.from('lectures').getPublicUrl(name).data.publicUrl;
    }

    const payload = { title, order: parseInt(order), section_id: document.getElementById('adm-section-select').value };
    if(url) payload.file_url = url;

    if(activeAdmBtn === 'edit') {
      await client.from('lectures').update(payload).eq('id', document.getElementById('adm-lecture-select').value);
    } else {
      await client.from('lectures').insert(payload);
    }
    location.reload();
  }

  async function deleteLecture() {
    if(!confirm('Точно удалить?')) return;
    const id = document.getElementById('adm-lecture-select').value;
    await client.from('lectures').delete().eq('id', id);
    location.reload();
  }

  init();
</script>
</body>
</html>
