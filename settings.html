<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .settings-layout {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .settings-section {
      background: var(--bg-card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px var(--shadow);
      border: 1px solid var(--border);
    }

    .settings-section-title {
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-row-left { display: flex; flex-direction: column; gap: 3px; }
    .settings-row-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .settings-row-desc { font-size: 13px; color: var(--text-secondary); }

    .toggle-wrap {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 28px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle-wrap input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle-wrap input:checked + .toggle-slider::before {
      transform: translateX(22px);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="main.html">
        <img src="logo.png" alt="Логотип">
      </a>
    </div>

    <div class="header-right">
      <div class="stat-badge wins" onclick="this.classList.toggle('show-count')">
  <img src="icons/wins.png" alt="Победы">
  <span id="wins-count">0</span>
</div>
<div class="stat-badge streak" onclick="this.classList.toggle('show-count')">
  <img src="icons/streak.png" alt="Стрик">
  <span id="streak-count">0</span>
</div>

      <div class="profile" id="profile-btn" onclick="toggleDropdown(event)">
        <div class="profile-icon">
          <img src="icons/profile-default.png" alt="Профиль" id="profile-avatar-img">
        </div>
        <span class="profile-name" id="profile-name">Загрузка...</span>
        <span class="profile-arrow">▼</span>

        <div class="dropdown">
          <a href="settings.html">⚙️ Настройки</a>
          <div class="divider"></div>
          <a href="#" class="logout" onclick="logout()">🚪 Выйти из аккаунта</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="settings-layout">

      <div>
        <div class="settings-title">⚙️ Настройки</div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Внешний вид</div>
        <div class="settings-row">
          <div class="settings-row-left">
            <div class="settings-row-label">🌙 Тёмная тема</div>
            <div class="settings-row-desc">Переключить на ночной режим</div>
          </div>
          <label class="toggle-wrap">
            <input type="checkbox" id="dark-toggle" onchange="toggleTheme()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Петряков Дмитрий</span></span>
      <span>Разработчик: <span class="credit-person">Дарханбаев Султан</span></span>
    </div>
    <div>©2026 Все права защищены.</div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Применяем тему сразу при загрузке
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark')
    }

    async function init() {
      const { data: { session } } = await client.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }

      const { data, error } = await client
        .from('profiles')
        .select('name, profile_bg, profile_avatar, wins, win_streak')
        .eq('id', session.user.id)
        .single()

      if (error || !data) { window.location.href = 'index.html'; return }

      document.getElementById('profile-name').textContent = data.name
      document.getElementById('wins-count').textContent = data.wins ?? 0
      document.getElementById('streak-count').textContent = data.win_streak ?? 0

      if (data.profile_avatar) document.getElementById('profile-avatar-img').src = data.profile_avatar

      if (data.profile_bg) {
        const btn = document.getElementById('profile-btn')
        btn.style.backgroundImage = `url('${data.profile_bg}')`
        const img = document.createElement('img')
        img.src = data.profile_bg
        img.style.position = 'absolute'
        img.style.inset = '0'
        img.style.width = '100%'
        img.style.height = '100%'
        img.style.objectFit = 'contain'
        img.style.zIndex = '0'
        btn.appendChild(img)
        btn.classList.add('has-bg')
      }

      // Устанавливаем состояние переключателя
      document.getElementById('dark-toggle').checked = localStorage.getItem('theme') === 'dark'
    }

    function toggleTheme() {
      const isDark = document.getElementById('dark-toggle').checked
      if (isDark) {
        document.body.classList.add('dark')
        localStorage.setItem('theme', 'dark')
      } else {
        document.body.classList.remove('dark')
        localStorage.setItem('theme', 'light')
      }
    }

    function toggleDropdown(e) {
      e.stopPropagation()
      document.getElementById('profile-btn').classList.toggle('open')
    }

    document.addEventListener('click', function(e) {
      const profile = document.getElementById('profile-btn')
      if (profile && !profile.contains(e.target)) profile.classList.remove('open')
    })

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>

</body>
</html>
