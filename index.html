<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ШАПКА -->
  <header>
    <div class="logo">
      <a href="" target="_blank" class="logo-placeholder">Заглушка</a>
    </div>
  </header>

  <!-- ЦЕНТР -->
  <div class="auth-wrapper">

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div class="auth-box" id="register-form">
      <h1>Регистрация</h1>

      <label>Имя</label>
      <input type="text" id="reg-name" placeholder="Например: Дмитрий Иванов">

      <label>Группа</label>
      <select id="reg-group">
        <option value="" disabled selected>Выбери группу</option>
        <option value="9-1ПО24">9-1ПО24</option>
        <option value="9-2ПО24">9-2ПО24</option>
        <option value="9-3ПО24">9-3ПО24</option>
      </select>

      <label>Email</label>
      <input type="email" id="reg-email" placeholder="email@example.com">

      <label>Пароль</label>
      <input type="password" id="reg-password" placeholder="Минимум 6 символов">

      <button onclick="register()">Зарегистрироваться</button>
      <p class="auth-message" id="reg-message"></p>

      <div class="switch-link">
        Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a>
      </div>
    </div>

    <!-- ФОРМА ЛОГИНА -->
    <div class="auth-box" id="login-form" style="display: none;">
      <h1>Вход</h1>

      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com">

      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="Пароль">

      <button onclick="login()">Войти</button>
      <p class="auth-message" id="login-message"></p>

      <div class="switch-link">
        Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a>
      </div>
    </div>

  </div>

  <!-- ПОДВАЛ -->
  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Петряков Дмитрий</span></span>
      <span>Разработчик: <span class="credit-person">Дарханбаев Султан</span></span>
    </div>
    <div>©2026 Все права Защищены.</div>
  </footer>

  <script>

    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    window.onload = async () => {
      const { data: { session } } = await client.auth.getSession()
      if (session) {
        window.location.href = 'main.html'
      }
    }

    function showLogin() {
      document.getElementById('register-form').style.display = 'none'
      document.getElementById('login-form').style.display = 'block'
    }

    function showRegister() {
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('register-form').style.display = 'block'
    }

    function setMessage(id, text, isSuccess = false) {
      const el = document.getElementById(id)
      el.textContent = text
      el.className = 'auth-message' + (isSuccess ? ' success' : '')
    }

    async function register() {
      const name = document.getElementById('reg-name').value.trim()
      const group = document.getElementById('reg-group').value
      const email = document.getElementById('reg-email').value.trim()
      const password = document.getElementById('reg-password').value

      if (!name || !group || !email || !password) {
        setMessage('reg-message', 'Заполни все поля!')
        return
      }

      const { data, error } = await client.auth.signUp({ email, password })

      if (error) {
        setMessage('reg-message', 'Ошибка: ' + error.message)
        return
      }

      const { error: profileError } = await client
        .from('profiles')
        .insert({ id: data.user.id, name: name, group: group })

      if (profileError) {
        setMessage('reg-message', 'Ошибка профиля: ' + profileError.message)
        return
      }

      setMessage('reg-message', '✅ Проверь почту — отправили письмо для подтверждения!', true)
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value

      if (!email || !password) {
        setMessage('login-message', 'Заполни все поля!')
        return
      }

      const { error } = await client.auth.signInWithPassword({ email, password })

      if (error) {
        setMessage('login-message', 'Ошибка: ' + error.message)
        return
      }

      window.location.href = 'main.html'
    }
  </script>

</body>
</html>
