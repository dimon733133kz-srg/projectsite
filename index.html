<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header>
    <div class="logo">
      <a href="main.html">
        <img src="logo.png" alt="Логотип">
      </a>
    </div>
  </header>

  <div class="auth-wrapper">

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div class="auth-box" id="register-form">
      <h1>Регистрация</h1>

      <label>Имя</label>
      <input type="text" id="reg-name" placeholder="Например: Дмитрий Иванов">

      <label>Группа</label>
      <div class="group-select-row">
        <select id="reg-group-prefix" onchange="updateGroupPreview()">
          <option value="" disabled selected>Выбери тип</option>
          <option value="9-1PO">9-1PO</option>
          <option value="9-2PO">9-2PO</option>
          <option value="9-3PO">9-3PO</option>
          <option value="9-1POIS">9-1POIS</option>
          <option value="9-2POIS">9-2POIS</option>
          <option value="9-3POIS">9-3POIS</option>
        </select>
        <div class="group-year-wrap">
          <input type="number" id="reg-group-year" placeholder="24" min="20" max="30"
            oninput="updateGroupPreview()">
        </div>
      </div>
      <div class="group-preview" id="group-preview">Группа: <span>—</span></div>

      <label>Email</label>
      <input type="email" id="reg-email" placeholder="email@example.com">

      <label>Пароль</label>
      <input type="password" id="reg-password" placeholder="Минимум 6 символов">

      <button onclick="register()">Зарегистрироваться</button>
      <p class="auth-message" id="reg-message"></p>

      <div class="switch-link">
        Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a>
      </div>
    </div>

    <!-- ФОРМА ВХОДА -->
    <div class="auth-box" id="login-form" style="display: none;">
      <h1>Вход</h1>

      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com">

      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="Пароль">

      <div class="forgot-link">
        <a href="#" onclick="showForgot()">Забыли пароль?</a>
      </div>

      <button onclick="login()">Войти</button>
      <p class="auth-message" id="login-message"></p>

      <div class="switch-link">
        Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a>
      </div>
    </div>

    <!-- ФОРМА ВОССТАНОВЛЕНИЯ ПАРОЛЯ -->
    <div class="auth-box" id="forgot-form" style="display: none;">
      <h1>Восстановление пароля</h1>

      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="email@example.com">

      <button onclick="sendReset()">Отправить письмо</button>
      <p class="auth-message" id="forgot-message"></p>

      <div class="switch-link">
        <a href="#" onclick="showLogin()">← Назад ко входу</a>
      </div>
    </div>

  </div>

  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Петряков Дмитрий</span></span>
      <span>Разработчик: <span class="credit-person">Дарханбаев Султан</span></span>
    </div>
    <div>©2026 Все права защищены.</div>
  </footer>

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark')
    }

    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Сохранённые данные регистрации — вставим в profiles после подтверждения email
    let pendingProfile = null

    window.onload = async () => {
      const { data: { session } } = await client.auth.getSession()

      // Если пришли по ссылке подтверждения — сессия уже создана
      if (session) {
        // Проверяем есть ли профиль — если нет, создаём из pendingProfile
        const { data: profile } = await client
          .from('profiles')
          .select('id')
          .eq('id', session.user.id)
          .single()

        if (!profile) {
          // Пробуем достать сохранённые данные из localStorage
          const saved = localStorage.getItem('pendingProfile')
          if (saved) {
            const p = JSON.parse(saved)
            await client.from('profiles').insert({
              id: session.user.id,
              name: p.name,
              group: p.group
            })
            localStorage.removeItem('pendingProfile')
          }
        }

        window.location.href = 'main.html'
      }
    }

    function updateGroupPreview() {
      const prefix = document.getElementById('reg-group-prefix').value
      const year = document.getElementById('reg-group-year').value
      const preview = document.getElementById('group-preview')

      if (prefix && year) {
        preview.innerHTML = `Группа: <span>${prefix}${year}</span>`
      } else if (prefix) {
        preview.innerHTML = `Группа: <span>${prefix}__</span>`
      } else {
        preview.innerHTML = `Группа: <span>—</span>`
      }
    }

    function showLogin() {
      document.getElementById('register-form').style.display = 'none'
      document.getElementById('forgot-form').style.display = 'none'
      document.getElementById('login-form').style.display = 'block'
    }

    function showRegister() {
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('forgot-form').style.display = 'none'
      document.getElementById('register-form').style.display = 'block'
    }

    function showForgot() {
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('forgot-form').style.display = 'block'
    }

    function setMessage(id, text, isSuccess = false) {
      const el = document.getElementById(id)
      el.textContent = text
      el.className = 'auth-message' + (isSuccess ? ' success' : '')
    }

    async function register() {
      const name = document.getElementById('reg-name').value.trim()
      const email = document.getElementById('reg-email').value.trim()
      const password = document.getElementById('reg-password').value
      const prefix = document.getElementById('reg-group-prefix').value
      const yearVal = parseInt(document.getElementById('reg-group-year').value)

      if (!name || !prefix || !yearVal || !email || !password) {
        setMessage('reg-message', 'Заполни все поля!')
        return
      }

      if (yearVal < 20 || yearVal > 30) {
        setMessage('reg-message', 'Год группы должен быть от 20 до 30!')
        return
      }

      const group = `${prefix}${yearVal}`

      // Сохраняем данные профиля локально — вставим после подтверждения email
      localStorage.setItem('pendingProfile', JSON.stringify({ name, group }))

      const { error } = await client.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: window.location.origin + window.location.pathname
        }
      })

      if (error) {
        localStorage.removeItem('pendingProfile')
        setMessage('reg-message', 'Ошибка: ' + error.message)
        return
      }

      setMessage('reg-message', '✅ Письмо отправлено! Подтверди email чтобы завершить регистрацию.', true)
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value

      if (!email || !password) {
        setMessage('login-message', 'Заполни все поля!')
        return
      }

      const { data, error } = await client.auth.signInWithPassword({ email, password })

      if (error) {
        setMessage('login-message', 'Ошибка: ' + error.message)
        return
      }

      // Проверяем подтверждён ли email
      if (!data.user.email_confirmed_at) {
        await client.auth.signOut()
        setMessage('login-message', 'Сначала подтверди email — проверь почту!')
        return
      }

      window.location.href = 'main.html'
    }

    async function sendReset() {
      const email = document.getElementById('forgot-email').value.trim()

      if (!email) {
        setMessage('forgot-message', 'Введи email!')
        return
      }

      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://dimon733133kz-srg.github.io/projectsite/reset.html'
      })

      if (error) {
        setMessage('forgot-message', 'Ошибка: ' + error.message)
        return
      }

      setMessage('forgot-message', '✅ Письмо отправлено! Проверь почту.', true)
    }
  </script>

</body>
</html>
