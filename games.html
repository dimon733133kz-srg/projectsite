    function highlightPython(code) {
      const lines = code.split('\n')
      return lines.map(line => {
        let result = ''
        let i = 0
 
        while (i < line.length) {

          if (line[i] === '#') {
            result += `<span class="tok-comment">${escHtml(line.slice(i))}</span>`
            break
          }

          if (line[i] === '"' || line[i] === "'") {
            const q = line[i]
            let end = i + 1
            const triple = line.slice(i, i+3) === q+q+q
            if (triple) end = i + 3
            while (end < line.length) {
              if (triple && line.slice(end, end+3) === q+q+q) { end += 3; break }
              if (!triple && line[end] === q && line[end-1] !== '\\') { end++; break }
              end++
            }
            result += `<span class="tok-string">${escHtml(line.slice(i, end))}</span>`
            i = end; continue
          }
 
          if (/\d/.test(line[i]) && (i === 0 || /\W/.test(line[i-1]))) {
            let end = i
            while (end < line.length && /[\d.xXbBoO]/.test(line[end])) end++
            result += `<span class="tok-number">${escHtml(line.slice(i, end))}</span>`
            i = end; continue
          }
			
          if (line[i] === '@') {
            let end = i + 1
            while (end < line.length && /[\w.]/.test(line[end])) end++
            result += `<span class="tok-decorator">${escHtml(line.slice(i, end))}</span>`
            i = end; continue
          }

          if (/[a-zA-Z_]/.test(line[i])) {
            let end = i
            while (end < line.length && /[\w]/.test(line[end])) end++
            const word = line.slice(i, end)
            if (PY_KEYWORDS.includes(word)) {
              if (word === 'None' || word === 'True' || word === 'False') {
                result += `<span class="tok-boolean">${word}</span>`
              } else {
                result += `<span class="tok-keyword">${word}</span>`
              }
            } else if (PY_BUILTINS.includes(word)) {
              result += `<span class="tok-builtin">${word}</span>`
            } else if (word === 'self' || word === 'cls') {
              result += `<span class="tok-self">${word}</span>`
            } else if (end < line.length && line[end] === '(') {
              result += `<span class="tok-function">${word}</span>`
            } else {
              result += escHtml(word)
            }
            i = end; continue
          }
			
          if (/[+\-*\/=<>!&|^~%]/.test(line[i])) {
            result += `<span class="tok-operator">${escHtml(line[i])}</span>`
            i++; continue
          }
          result += escHtml(line[i])
          i++
        }
        return result
      }).join('\n')
    }
 
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')

    function setupHighlightedEditor(textareaId, preId) {
      const ta = document.getElementById(textareaId)
      const pre = document.getElementById(preId)
      if (!ta || !pre) return
 
      function sync() {
        pre.innerHTML = highlightPython(ta.value) + '\n'
        pre.scrollTop = ta.scrollTop
        pre.scrollLeft = ta.scrollLeft
      }
 
      ta.addEventListener('input', sync)
      ta.addEventListener('scroll', () => {
        pre.scrollTop = ta.scrollTop
        pre.scrollLeft = ta.scrollLeft
      })
      ta.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault()
          const s = this.selectionStart, end = this.selectionEnd
          this.value = this.value.substring(0, s) + '    ' + this.value.substring(end)
          this.selectionStart = this.selectionEnd = s + 4
          sync()
        }
      })
      sync()
    }

    async function loadPyodide() {
      if (pyodide) { renderMode(); return }
      if (pyodideLoading) return
      pyodideLoading = true
      try {
        const fill = document.getElementById('loader-fill')
        const text = document.getElementById('loader-text')
        if (fill) fill.style.width = '20%'
        const script = document.createElement('script')
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js'
        document.head.appendChild(script)
        await new Promise((res, rej) => { script.onload = res; script.onerror = rej })
        if (fill) fill.style.width = '50%'
        if (text) text.textContent = 'Инициализация Python...'
        pyodide = await window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' })
        if (fill) fill.style.width = '100%'
        if (text) text.textContent = 'Готово!'
        await new Promise(r => setTimeout(r, 400))
        renderMode()
      } catch {
        const loader = document.getElementById('pyodide-loader')
        if (loader) loader.innerHTML = '<div style="color:#dc2626;font-size:14px;">❌ Ошибка загрузки Python.</div>'
      }
    }

    function newTask() {
      currentTask = [...TASKS].sort(() => Math.random() - 0.5)[0]

      renderTaskMode()
    }
 
    async function runTask() {
      if (!pyodide || taskSolved) return
      const code = document.getElementById('code-editor').value
      const out = document.getElementById('console-output')
      out.innerHTML = '<span class="info-line">// Выполняется...</span>'
      let passed = 0, failed = 0, lines = []
 
      for (const test of currentTask.tests) {
        try {
          pyodide.runPython(code + '\nresult = ' + test.call)
          const result = pyodide.globals.get('result')
          const got = typeof result === 'boolean' ? result : (typeof result === 'string' ? result : Number(result))
          const ok = String(got) === String(test.expected)
          if (ok) { passed++; lines.push(`<span class="ok-line">✅ ${test.call} → ${got}</span>`) }
          else { failed++; lines.push(`<span class="err-line">❌ ${test.call} → получено: ${got}, ожидалось: ${test.expected}</span>`) }
        } catch (e) {
          failed++; lines.push(`<span class="err-line">❌ ${test.call} → ${e.message}</span>`)
        }
      }
 
      out.innerHTML = lines.join('\n')
      if (failed === 0) {
        out.innerHTML += `\n<span class="ok-line">🎉 Все тесты пройдены! +${currentTask.reward} 🪙</span>`
        taskSolved = true
        const newMoney = currentMoney + currentTask.reward
        await client.from('profiles').update({ money: newMoney }).eq('id', currentUserId)
        currentMoney = newMoney
        const runBtn = document.getElementById('run-btn')
        if (runBtn) runBtn.disabled = true
        const body = document.querySelector('.compiler-body')
        if (body) {
          const div = document.createElement('div')
          div.className = 'task-result pass'
          div.textContent = '✅ Задание выполнено! Награда получена.'
          body.appendChild(div)
        }
      } else {
        out.innerHTML += `\n<span class="info-line">Пройдено: ${passed}/${currentTask.tests.length}</span>`
      }
    }

          </div>
        </div>`
      setupHighlightedEditor('code-editor', 'highlight-pre')
    }
 
    async function runSandbox() {
      if (!pyodide) return
      const code = document.getElementById('code-editor').value
      const out = document.getElementById('console-output')
      out.innerHTML = ''
      let outputLines = []
      pyodide.runPython(`
import builtins
def _input(prompt=''):
    import js
    result = js.prompt(prompt)
    return result if result is not None else ''
builtins.input = _input
`)
      pyodide.setStdout({ batched: (t) => outputLines.push(t) })
      pyodide.setStderr({ batched: (t) => outputLines.push(`<span class="err-line">${t}</span>`) })
      try {
        await pyodide.runPythonAsync(code)
        out.innerHTML = outputLines.length === 0
          ? '<span class="info-line">// Код выполнен без вывода</span>'
          : outputLines.map(l => l.startsWith('<span') ? l : `<span class="out-line">${l}</span>`).join('\n')
      } catch (e) {
        out.innerHTML = `<span class="err-line">${e.message}</span>`
      }
    }
 
    function clearConsole() {
      const out = document.getElementById('console-output')
      if (out) out.innerHTML = '<span class="info-line">// Очищено</span>'
    }
 
    function showTypingSetup() {
      clearTypingTimer()
      typingDiff = null
      const content = document.getElementById('main-content')
      content.style.alignItems = 'center'
      content.style.justifyContent = 'center'
      content.innerHTML = `
        <div class="typing-setup-box">
          <div class="typing-setup-inner">
            <div class="typing-setup-title">⌨️ Быстрая печать</div>
 
            <div>
              <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary,#64748b);margin-bottom:12px;">Сложность</div>
              <div class="typing-diff-btns">
                <button class="typing-diff-btn" data-diff="easy" onclick="selectDiff('easy')">
                  <span class="typing-diff-icon">🟢</span>
                  <span>Лёгкий</span>
                  <span class="typing-diff-label">50 + 20/сек</span>
                </button>
                <button class="typing-diff-btn" data-diff="medium" onclick="selectDiff('medium')">
                  <span class="typing-diff-icon">🟡</span>
                  <span>Средний</span>
                  <span class="typing-diff-label">100 + 30/сек</span>
                </button>
                <button class="typing-diff-btn" data-diff="hard" onclick="selectDiff('hard')">
                  <span class="typing-diff-icon">🔴</span>
                  <span>Тяжёлый</span>
                  <span class="typing-diff-label">150 + 50/сек</span>
                </button>
              </div>
            </div>
 
            <div style="font-size:13px;color:var(--text-secondary,#64748b);text-align:center;">
              30 секунд · 3 жизни от ошибок (-50 монет за ошибку)
            </div>
 
            <button class="typing-start-btn" id="typing-start-btn" onclick="startTyping()" disabled>
              Начать
            </button>
 
            <button class="typing-result-btn secondary" onclick="showGameSelect()" style="text-align:center;">
              ← Назад к играм
            </button>
          </div>
        </div>`
    }
 
    function selectDiff(diff) {
      typingDiff = diff
      document.querySelectorAll('.typing-diff-btn').forEach(b => b.classList.remove('selected'))
      document.querySelector(`[data-diff="${diff}"]`).classList.add('selected')
      document.getElementById('typing-start-btn').disabled = false
    }
 
    function startTyping() {
      if (!typingDiff) return
      const texts = TYPING_TEXTS[typingDiff]
      typingText = texts[Math.floor(Math.random() * texts.length)]
      typingErrors = 0
      typingFinished = false
      typingTimeLeft = TYPING_CONFIG[typingDiff].time
 
      const content = document.getElementById('main-content')
      content.style.alignItems = 'stretch'
      content.style.justifyContent = 'flex-start'
      content.innerHTML = `
        <div class="typing-game-layout">
          <div class="typing-topbar">
            <div class="typing-topbar-left">
              <button class="back-btn" onclick="showTypingSetup()">← Назад</button>
              <div class="typing-page-title">⌨️ ${TYPING_CONFIG[typingDiff].label}</div>
            </div>
            <div class="typing-stats">
              <div class="typing-errors-badge">❌ <span id="errors-count">0</span> ошибок</div>
              <div class="typing-timer" id="typing-timer">${typingTimeLeft}с</div>
            </div>
          </div>
 
          <div class="typing-display-wrap" id="typing-display-wrap">
            <pre class="typing-display-pre" id="typing-target">${escHtml(typingText)}</pre>
            <pre class="typing-chars-overlay" id="typing-chars"></pre>
            <textarea class="typing-input-overlay" id="typing-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          </div>
        </div>`
 
      const input = document.getElementById('typing-input')
      input.focus()
      input.addEventListener('input', onTypingInput)
 
      typingTimer = setInterval(() => {
        typingTimeLeft--
        const el = document.getElementById('typing-timer')
        if (!el) { clearTypingTimer(); return }
        el.textContent = typingTimeLeft + 'с'
        if (typingTimeLeft <= 10) el.classList.add('urgent')
        if (typingTimeLeft <= 0) {
          clearTypingTimer()
          finishTyping(false)
        }
      }, 1000)
    }
 
function onTypingInput() {
  if (typingFinished) return
  const input = document.getElementById('typing-input')
  const typed = input.value
  const target = typingText
  const charsEl = document.getElementById('typing-chars')

  let html = ''
  let errorCount = 0

  for (let i = 0; i < typed.length; i++) {
    if (i >= target.length) break
    const typedChar = typed[i]
    const targetChar = target[i]

    if (targetChar === ' ' || targetChar === '\n') {
      if (typedChar === ' ' || typedChar === '\n') {
        html += `<span class="char-correct">${escHtml(targetChar)}</span>`
      } else {
        html += `<span class="char-wrong">${escHtml(targetChar)}</span>`
        errorCount++
      }
    } else {
      if (typedChar === targetChar) {
        html += `<span class="char-correct">${escHtml(typedChar)}</span>`
      } else {
        html += `<span class="char-wrong">${escHtml(targetChar)}</span>`
        errorCount++
      }
    }
  }

  charsEl.innerHTML = html
  typingErrors = errorCount
  document.getElementById('errors-count').textContent = errorCount

  const normalizeSpaces = s => s.replace(/[ \t]+/g, ' ').replace(/\n /g, '\n').trim()
  if (normalizeSpaces(typed) === normalizeSpaces(target)) {
    clearTypingTimer()
    finishTyping(true)
  }
}
 
    function clearTypingTimer() {
      if (typingTimer) { clearInterval(typingTimer); typingTimer = null }
    }
 
    async function finishTyping(completed) {
      typingFinished = true
      clearTypingTimer()
 
      const cfg = TYPING_CONFIG[typingDiff]
      const secsLeft = typingTimeLeft
      const errorPenalty = typingErrors * 50
      let reward = cfg.base + secsLeft * cfg.perSec - errorPenalty
      if (reward < 0) reward = 0
      if (!completed) reward = Math.floor(reward * 0.3)
 
      const newMoney = currentMoney + reward
      await client.from('profiles').update({ money: newMoney }).eq('id', currentUserId)
      currentMoney = newMoney
 
      const content = document.getElementById('main-content')
      content.style.alignItems = 'center'
      content.style.justifyContent = 'center'
      content.innerHTML = `
        <div class="typing-setup-box">
          <div class="typing-result-box">
            <div class="typing-result-title">${completed ? '🏆 Завершено!' : '⏱ Время вышло!'}</div>
            <div class="typing-result-grid">
              <div class="typing-stat-card good">
                <div class="typing-stat-label">Сложность</div>
                <div class="typing-stat-value">${cfg.label}</div>
              </div>
              <div class="typing-stat-card ${typingErrors > 0 ? 'bad' : 'good'}">
                <div class="typing-stat-label">Ошибок</div>
                <div class="typing-stat-value">${typingErrors}</div>
              </div>
              <div class="typing-stat-card info">
                <div class="typing-stat-label">Осталось секунд</div>
                <div class="typing-stat-value">${completed ? secsLeft : 0}</div>
              </div>
              <div class="typing-stat-card bad">
                <div class="typing-stat-label">Штраф за ошибки</div>
                <div class="typing-stat-value">-${errorPenalty} 🪙</div>
              </div>
            </div>
            <div class="typing-result-reward">
              💰 Награда
              <div class="typing-result-amount">+${reward} 🪙</div>
            </div>
            <div style="display:flex;gap:10px;">
              <button class="typing-result-btn secondary" style="flex:1;" onclick="showGameSelect()">← Игры</button>
              <button class="typing-result-btn primary" style="flex:1;" onclick="showTypingSetup()">Ещё раз</button>
            </div>
          </div>
        </div>`
    }
 
    function toggleDropdown(e) {
      e.stopPropagation()
      document.getElementById('profile-btn').classList.toggle('open')
    }
 
    document.addEventListener('click', function(e) {
      const profile = document.getElementById('profile-btn')
      if (profile && !profile.contains(e.target)) profile.classList.remove('open')
    })
 
    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }
 
    init()
  </script>
 
</body>
</html>
