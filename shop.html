<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header>
    <div class="logo">
      <a href="" target="_blank">
  <img src="logo.png" alt="Логотип">
</a>
    </div>

    <div class="profile" id="profile-btn" onclick="toggleDropdown(event)">
      <div class="profile-icon">
        <img src="icons/profile-default.png" alt="Профиль">
      </div>
      <span class="profile-name" id="profile-name">Загрузка...</span>
      <span class="profile-arrow">▼</span>

      <div class="dropdown">
        <a href="#">⚙️ Настройки</a>
        <div class="divider"></div>
        <a href="#" class="logout" onclick="logout()">🚪 Выйти из аккаунта</a>
      </div>
    </div>
  </header>

  <main>
    <div class="shop-layout">

      <div class="shop-modes">
        <button class="mode-btn active" id="btn-buy" onclick="setMode('buy')">
          <span class="mode-btn-icon">🛒</span>
          Купить
        </button>
        <button class="mode-btn" id="btn-inventory" onclick="setMode('inventory')">
          <span class="mode-btn-icon">🎒</span>
          Инвентарь
        </button>
      </div>

      <div class="shop-categories">
        <div class="shop-categories-title">Разделы</div>
        <button class="category-btn active" onclick="setCategory('backgrounds', this)">
          🖼️ Фон профиля
        </button>
      </div>

      <div class="shop-content">
        <div class="shop-header">
          <div class="shop-header-left">
            <a href="main.html" class="back-btn">Назад</a>
            <div class="shop-title" id="shop-title">Купить - Фон профиля</div>
          </div>
          <div class="money-badge">
            <span>🪙</span>
            <span id="user-money">...</span>
          </div>
        </div>

        <div class="items-grid" id="items-grid"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Петряков Дмитрий</span></span>
      <span>Разработчик: <span class="credit-person">Дарханбаев Султан</span></span>
    </div>
    <div>©2026 Все права защищены.</div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'


    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let currentUser = null
    let currentMode = 'buy'
    let currentCategory = 'backgrounds'
    let ownedIds = []
    let activeBgId = null

    async function init() {
      const { data: { session } } = await client.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }

      const { data, error } = await client
        .from('profiles')
        .select('name, money, profile_bg')
        .eq('id', session.user.id)
        .single()

      if (error || !data) { window.location.href = 'index.html'; return }

      currentUser = session.user
      activeBgId = data.profile_bg ?? null

      document.getElementById('profile-name').textContent = data.name
      document.getElementById('user-money').textContent = data.money ?? 0

      if (data.profile_bg) await loadProfileBg(data.profile_bg)

      await loadOwned()
      await loadShopItems()
    }

    async function loadProfileBg(bgId) {
      const { data: item } = await client
        .from('shop_items')
        .select('image_url')
        .eq('id', bgId)
        .single()

      if (!item) return

      const btn = document.getElementById('profile-btn')
      btn.style.backgroundImage = `url('${item.image_url}')`
      btn.classList.add('has-bg')
    }

    function clearProfileBg() {
      const btn = document.getElementById('profile-btn')
      btn.style.backgroundImage = ''
      btn.classList.remove('has-bg')
    }

    async function loadOwned() {
      const { data } = await client
        .from('owned_avatars')
        .select('item_id')
        .eq('user_id', currentUser.id)

      ownedIds = data ? data.map(d => d.item_id) : []
    }

    function setMode(mode) {
      currentMode = mode
      document.getElementById('btn-buy').classList.toggle('active', mode === 'buy')
      document.getElementById('btn-inventory').classList.toggle('active', mode === 'inventory')
      updateTitle()
      mode === 'buy' ? loadShopItems() : loadInventory()
    }

    function setCategory(category, btn) {
      currentCategory = category
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      updateTitle()
      currentMode === 'buy' ? loadShopItems() : loadInventory()
    }

    function updateTitle() {
      const modeLabel = currentMode === 'buy' ? 'Купить' : 'Инвентарь'
      const catLabel = currentCategory === 'backgrounds' ? 'Фон профиля' : currentCategory
      document.getElementById('shop-title').textContent = `${modeLabel} — ${catLabel}`
    }

    async function loadShopItems() {
      const grid = document.getElementById('items-grid')
      grid.innerHTML = '<p style="color:#94a3b8;padding:20px">Загрузка...</p>'

      const { data, error } = await client.from('shop_items').select('*')

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-text">Товаров пока нет</div></div>`
        return
      }

      grid.innerHTML = ''
      data.forEach(item => {
        const owned = ownedIds.includes(item.id)
        grid.innerHTML += `
          <div class="item-card">
            ${item.image_url
              ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">`
              : `<div class="item-img-placeholder">🖼️</div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-price"><span class="item-price-coin">🪙</span> ${item.price}</div>
              ${owned
                ? `<button class="item-btn owned" disabled>✅ Куплено</button>`
                : `<button class="item-btn buy" onclick="buyItem('${item.id}', ${item.price}, '${item.name}')">Купить</button>`}
            </div>
          </div>`
      })
    }

    async function loadInventory() {
      const grid = document.getElementById('items-grid')
      grid.innerHTML = '<p style="color:#94a3b8;padding:20px">Загрузка...</p>'

      if (ownedIds.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎒</div><div class="empty-state-text">Инвентарь пуст — купи что-нибудь!</div></div>`
        return
      }

      const { data, error } = await client
        .from('shop_items')
        .select('*')
        .in('id', ownedIds)

      if (error || !data) {
        grid.innerHTML = '<p style="color:#dc2626;padding:20px">Ошибка загрузки</p>'
        return
      }

      grid.innerHTML = ''
      data.forEach(item => {
        const isEquipped = activeBgId === item.id
        grid.innerHTML += `
          <div class="item-card">
            ${item.image_url
              ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">`
              : `<div class="item-img-placeholder">🖼️</div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              ${isEquipped
                ? `
                  <button class="item-btn equipped" disabled>✨ Активно</button>
                  <button class="item-btn unequip" onclick="unequipItem()">Снять</button>
                `
                : `<button class="item-btn equip" onclick="equipItem('${item.id}', '${item.name}')">Надеть</button>`}
            </div>
          </div>`
      })
    }

    async function buyItem(itemId, price, itemName) {
      const { data: profile } = await client
        .from('profiles')
        .select('money')
        .eq('id', currentUser.id)
        .single()

      if (profile.money < price) { showToast('Недостаточно монет!', 'error'); return }

      const { error: moneyError } = await client
        .from('profiles')
        .update({ money: profile.money - price })
        .eq('id', currentUser.id)

      if (moneyError) { showToast('Ошибка покупки', 'error'); return }

      const { error: ownError } = await client
        .from('owned_avatars')
        .insert({ user_id: currentUser.id, item_id: itemId })

      if (ownError) { showToast('Ошибка покупки', 'error'); return }

      document.getElementById('user-money').textContent = profile.money - price
      ownedIds.push(itemId)
      showToast(`✅ Куплено: ${itemName}`, 'success')
      await loadShopItems()
    }

    async function equipItem(itemId, itemName) {
      const { data: item } = await client
        .from('shop_items')
        .select('image_url')
        .eq('id', itemId)
        .single()

      const { error } = await client
        .from('profiles')
        .update({ profile_bg: itemId })
        .eq('id', currentUser.id)

      if (error) { showToast('Ошибка', 'error'); return }

      activeBgId = itemId
      const btn = document.getElementById('profile-btn')
      btn.style.backgroundImage = `url('${item.image_url}')`
      btn.classList.add('has-bg')

      showToast(`✨ Активировано: ${itemName}`, 'success')
      await loadInventory()
    }

    async function unequipItem() {
      const { error } = await client
        .from('profiles')
        .update({ profile_bg: null })
        .eq('id', currentUser.id)

      if (error) { showToast('Ошибка', 'error'); return }

      activeBgId = null
      clearProfileBg()
      showToast('Фон снят', 'success')
      await loadInventory()
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.className = `toast ${type} show`
      setTimeout(() => toast.classList.remove('show'), 3000)
    }

    function toggleDropdown(e) {
  e.stopPropagation()
  document.getElementById('profile-btn').classList.toggle('open')
}

    document.addEventListener('click', function(e) {
  const profile = document.getElementById('profile-btn')
  if (!profile) return
  if (!profile.contains(e.target)) {
    profile.classList.remove('open')
  }
})

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>

</body>
</html>
