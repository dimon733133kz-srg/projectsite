</header><main>
<div class="shop-layout"><div class="shop-modes">
  <button onclick="setMode('buy')">🛒 Купить</button>
  <button onclick="setMode('inventory')">🎒 Инвентарь</button>
</div><div class="shop-categories">
  <button onclick="setCategory('background', this)">🖼️ Фоны</button>
  <button onclick="setCategory('avatar', this)">👤 Аватары</button>
</div><div id="items-grid"></div></div>
</main><script>
const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'


const { createClient } = supabase
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let currentUser
let currentMode = 'buy'
let currentCategory = 'background'

async function init(){
  const { data:{session} } = await client.auth.getSession()
  if(!session) location.href='index.html'

  currentUser = session.user

  const { data } = await client
    .from('profiles')
    .select('money')
    .eq('id', currentUser.id)
    .single()

  document.getElementById('user-money').textContent = data.money

  loadItems()
}

function setMode(m){ currentMode=m; loadItems() }
function setCategory(c){ currentCategory=c; loadItems() }

function caseMatchesCategory(items){
  return items.some(i => i.type === currentCategory)
}

async function loadItems(){
  if(currentMode==='buy') loadCases()
  else loadInventory()
}

async function loadCases(){
  const grid = document.getElementById('items-grid')
  grid.innerHTML='Загрузка...'

  const { data: cases } = await client.from('cases').select('*')

  grid.innerHTML=''

  for(const c of cases){
    const { data: items } = await client
      .from('shop_items')
      .select('*')
      .eq('case_id', c.id)

    if(!items || !caseMatchesCategory(items)) continue

    grid.innerHTML += 
      <div class="item-card">
        <img src="${c.image_url}" width="120">

        <div>${c.name}</div>
        <div>🪙 ${c.price}</div>

        <button onclick="openCasePreview(${c.id})">?</button>
        <button onclick="openCase(${c.id})">Открыть</button>
      </div>
    
  }
}

async function loadInventory(){
  const grid = document.getElementById('items-grid')
  grid.innerHTML='Загрузка...'

  const { data: owned } = await client
    .from('owned_avatars')
    .select('item_id')
    .eq('user_id', currentUser.id)
    .eq('type', currentCategory)

  if(!owned || owned.length===0){
    grid.innerHTML='Пусто'
    return
  }

  const ids = owned.map(i=>i.item_id)

  const { data: items } = await client
    .from('shop_items')
    .select('*')
    .in('id', ids)

  grid.innerHTML=''

  items.forEach(i=>{
    grid.innerHTML+=
      <div class="item-card">
        <img src="${i.image_url}" width="100">
        <div>${i.name}</div>
      </div>
    
  })
}

async function openCasePreview(id){
  const { data: items } = await client
    .from('shop_items')
    .select('*')
    .eq('case_id', id)

  const total = items.reduce((s,i)=>s+(i.chance||0),0)

  let html = '<div style="background:white;padding:20px">'

  items.forEach(i=>{
    const percent = ((i.chance||0)/total*100).toFixed(2)

    html += 
      <div style="display:flex;gap:10px;margin-bottom:5px">
        <img src="${i.image_url}" width="40">
        <span>${percent}%</span>
      </div>
    
  })

  html += '<button onclick="closeModal()">Закрыть</button></div>'

  showModal(html)
}

async function openCase(id){
  const { data: caseData } = await client
    .from('cases')
    .select('*')
    .eq('id', id)
    .single()

  const { data: items } = await client
    .from('shop_items')
    .select('*')
    .eq('case_id', id)

  const win = rollItem(items)

  // 🔊 звук из БД
  if(caseData.sound_url){
    const audio = new Audio(caseData.sound_url)
    audio.play()
  }

  startRoulette(items, win)

  await client.from('owned_avatars').insert({
    user_id: currentUser.id,
    item_id: win.id,
    type: win.type
  })

  const { data: profile } = await client
    .from('profiles')
    .select('money')
    .eq('id', currentUser.id)
    .single()

  await client
    .from('profiles')
    .update({ money: profile.money + 50 })
    .eq('id', currentUser.id)
}

function startRoulette(items, win){
  const wrap = document.createElement('div')
  wrap.className='roulette'

  const track = document.createElement('div')
  track.className='roulette-track'

  let arr=[]
  for(let i=0;i<40;i++){
    arr.push(items[Math.floor(Math.random()*items.length)])
  }

  arr[32]=win

  track.innerHTML = arr.map(i=><img src="${i.image_url}">).join('')

  wrap.innerHTML = '<div class="roulette-pointer"></div>'
  wrap.appendChild(track)

  document.body.appendChild(wrap)

  setTimeout(()=>{
    track.style.transform = translateX(-${32*110}px)
  },50)

  setTimeout(()=>{
    showWin(win)
    wrap.remove()
  },3200)
}

function showWin(item){
  showModal(
    <div style="background:white;padding:20px;text-align:center">
      <img src="${item.image_url}" width="120">
      <h2>${item.name}</h2>
      <p>${item.type}</p>
      <button onclick="closeModal()">Закрыть</button>
    </div>
  )
}

function showModal(html){
  const m=document.createElement('div')
  m.id='modal'
  m.style="position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center"
  m.innerHTML=html
  document.body.appendChild(m)
}

function closeModal(){
  document.getElementById('modal')?.remove()
}

init()
</script></body>
</html>
