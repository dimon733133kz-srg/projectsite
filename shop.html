<div class="stat-badge streak" onclick="this.classList.toggle('show-count')">

      <div class="profile" id="profile-btn" onclick="toggleDropdown(event)">
        <div class="profile-icon">

  </header>

  <main>
    <div class="shop-layout">

      <div class="shop-modes">
        <button class="mode-btn active" id="btn-buy" onclick="setMode('buy')">
          <span class="mode-btn-icon">🛒</span>
          Купить
        </button>
        <button class="mode-btn" id="btn-inventory" onclick="setMode('inventory')">
          <span class="mode-btn-icon">🎒</span>

        </button>
      </div>

      <div class="shop-categories">
        <div class="shop-categories-title">Разделы</div>
        <button class="category-btn active" id="cat-bg" onclick="setCategory('background', this)">
          🖼️ Фон профиля
        </button>
        <button class="category-btn" id="cat-avatar" onclick="setCategory('avatar', this)">
          👤 Фото профиля

      </div>

      <div class="shop-content">
        <div class="shop-header">
          <div class="shop-header-left">
            <a href="main.html" class="back-btn">← Назад</a>
            <div class="shop-title" id="shop-title">Купить — Фон профиля</div>
          </div>
          <div class="money-badge">
            <span>🪙</span>

        <div class="items-grid" id="items-grid"></div>
      </div>

    </div>

  <footer>

  </footer>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark')
    }  

    let currentUser = null
    let currentMode = 'buy'
    let currentCategory = 'background'
    let ownedIds = []
    let activeBg = null
    let activeAvatar = null

    async function init() {
      const { data: { session } } = await client.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }

      const { data, error } = await client
        .from('profiles')
        .select('name, money, profile_bg, profile_avatar, wins, win_streak')
        .eq('id', session.user.id)
        .single()

      if (error || !data) { window.location.href = 'index.html'; return }

      currentUser = session.user
      activeBg = data.profile_bg ?? null
      activeAvatar = data.profile_avatar ?? null

      document.getElementById('profile-name').textContent = data.name
      document.getElementById('user-money').textContent = data.money ?? 0
      document.getElementById('wins-count').textContent = data.wins ?? 0
      document.getElementById('streak-count').textContent = data.win_streak ?? 0

      if (data.profile_avatar) {
        document.getElementById('profile-avatar-img').src = data.profile_avatar
      }

      if (data.profile_bg) {
        const btn = document.getElementById('profile-btn')
        btn.style.backgroundImage = `url('${data.profile_bg}')`

const img = document.createElement('img')
img.src = data.profile_bg
img.style.position = 'absolute'
img.style.inset = '0'
img.style.width = '100%'
img.style.height = '100%'
img.style.objectFit = 'contain'
img.style.zIndex = '0'

btn.appendChild(img)

        btn.classList.add('has-bg')
      }

      await loadOwned()
      await loadItems()
    }

    async function loadOwned() {
      const { data } = await client
        .from('owned_avatars')
        .select('item_id, type')
        .eq('user_id', currentUser.id)

      ownedIds = data ? data.map(d => d.item_id) : []
    }

    function setMode(mode) {
      currentMode = mode
      document.getElementById('btn-buy').classList.toggle('active', mode === 'buy')
      document.getElementById('btn-inventory').classList.toggle('active', mode === 'inventory')
      updateTitle()
      loadItems()
    }

    function setCategory(category, btn) {
      currentCategory = category
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      updateTitle()
      loadItems()
    }

    function updateTitle() {
      const modeLabel = currentMode === 'buy' ? 'Купить' : 'Инвентарь'
      const catLabel = currentCategory === 'background' ? 'Фон профиля' : 'Фото профиля'
      document.getElementById('shop-title').textContent = `${modeLabel} — ${catLabel}`
    }

    async function loadItems() {
      if (currentMode === 'buy') await loadShopItems()
      else await loadInventory()
    }

async function loadShopItems() {
  const grid = document.getElementById('items-grid')
  grid.innerHTML = '<p style="color:#94a3b8;padding:20px">Загрузка...</p>'

  // грузим кейсы
  const { data: cases, error } = await client
    .from('cases')
    .select('*')

  if (error  !cases  cases.length === 0) {
    grid.innerHTML = <div class="empty-state">Нет кейсов</div>
    return
  }

  grid.innerHTML = ''

  for (const c of cases) {
    const { data: items } = await client
      .from('shop_items')
      .select('*')
      .eq('case_id', c.id)

    if (!items || items.length === 0) continue

    // проверка категории (ВАЖНО)
    const matches = items.some(i => i.type === currentCategory)
    if (!matches) continue

    grid.innerHTML += 
      <div class="item-card">
        ${c.image_url 
          ? <img class="item-img" src="${c.image_url}">
          : <div class="item-img-placeholder">📦</div>}

        <div class="item-info">
          <div class="item-name">${c.name}</div>
          <div class="item-price"><span class="item-price-coin">🪙</span> ${c.price}</div>

          <div style="display:flex;gap:6px">
            <button class="item-btn" onclick="openCasePreview('${c.id}')">?</button>
            <button class="item-btn buy" onclick="openCase('${c.id}')">Открыть</button>
          </div>
        </div>
      </div>
    
  }
}
      const { data, error } = await client
        .from('shop_items')
        .select('*')
        .eq('type', currentCategory)

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-text">Товаров пока нет</div></div>`
        return
      }

      grid.innerHTML = ''
      data.forEach(item => {
        const owned = ownedIds.includes(item.id)
        grid.innerHTML += `
          <div class="item-card">
            ${item.image_url ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">` : `<div class="item-img-placeholder">🖼️</div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-price"><span class="item-price-coin">🪙</span> ${item.price}</div>
              ${owned
                ? `<button class="item-btn owned" disabled>✅ Куплено</button>`
                : `<button class="item-btn buy" onclick="buyItem('${item.id}', ${item.price}, '${item.name}', '${item.image_url}', '${item.type}')">Купить</button>`}
            </div>
          </div>`
      })
    }

    async function loadInventory() {
      const grid = document.getElementById('items-grid')
      grid.innerHTML = '<p style="color:#94a3b8;padding:20px">Загрузка...</p>'

      const { data: ownedData } = await client
        .from('owned_avatars')
        .select('item_id')
        .eq('user_id', currentUser.id)
        .eq('type', currentCategory)

      const ownedOfType = ownedData ? ownedData.map(d => d.item_id) : []

      if (ownedOfType.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎒</div><div class="empty-state-text">Инвентарь пуст — купи что-нибудь!</div></div>`
        return
      }

      const { data, error } = await client
        .from('shop_items')
        .select('*')
        .in('id', ownedOfType)

      if (error || !data) {
        grid.innerHTML = '<p style="color:#dc2626;padding:20px">Ошибка загрузки</p>'
        return
      }

      grid.innerHTML = ''
      data.forEach(item => {
        const isEquipped = currentCategory === 'background'
          ? activeBg === item.image_url
          : activeAvatar === item.image_url

        grid.innerHTML += `
          <div class="item-card">
            ${item.image_url ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">` : `<div class="item-img-placeholder">🖼️</div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              ${isEquipped
                ? `
                  <button class="item-btn equipped" disabled>✨ Активно</button>
                  <button class="item-btn unequip" onclick="unequipItem('${item.type}')">Снять</button>
                `
                : `<button class="item-btn equip" onclick="equipItem('${item.image_url}', '${item.name}', '${item.type}')">Надеть</button>`}
            </div>
          </div>`
      })
    }

    async function buyItem(itemId, price, itemName, imageUrl, type) {
      const { data: profile } = await client
        .from('profiles')
        .select('money')
        .eq('id', currentUser.id)
        .single()

      if (profile.money < price) { showToast('Недостаточно монет!', 'error'); return }

      const { error: moneyError } = await client
        .from('profiles')
        .update({ money: profile.money - price })
        .eq('id', currentUser.id)

      if (moneyError) { showToast('Ошибка покупки', 'error'); return }

      const { error: ownError } = await client
        .from('owned_avatars')
        .insert({ user_id: currentUser.id, item_id: itemId, type: type })

      if (ownError) { showToast('Ошибка покупки', 'error'); return }

      document.getElementById('user-money').textContent = profile.money - price
      ownedIds.push(itemId)
      showToast(`✅ Куплено: ${itemName}`, 'success')
      await loadShopItems()
    }

    async function equipItem(imageUrl, itemName, type) {
      const field = type === 'background' ? 'profile_bg' : 'profile_avatar'

      const { error } = await client
        .from('profiles')
        .update({ [field]: imageUrl })
        .eq('id', currentUser.id)

      if (error) { showToast('Ошибка', 'error'); return }

      if (type === 'background') {
        activeBg = imageUrl
        const btn = document.getElementById('profile-btn')
        btn.style.backgroundImage = `url('${imageUrl}')`
        btn.classList.add('has-bg')
      } else {
        activeAvatar = imageUrl
        document.getElementById('profile-avatar-img').src = imageUrl
      }

      showToast(`✨ Активировано: ${itemName}`, 'success')
      await loadInventory()
    }

    async function unequipItem(type) {
      const field = type === 'background' ? 'profile_bg' : 'profile_avatar'

      const { error } = await client
        .from('profiles')
        .update({ [field]: null })
        .eq('id', currentUser.id)

      if (error) { showToast('Ошибка', 'error'); return }

      if (type === 'background') {
        activeBg = null
        const btn = document.getElementById('profile-btn')
        btn.style.backgroundImage = ''
        btn.classList.remove('has-bg')
      } else {
        activeAvatar = null
        document.getElementById('profile-avatar-img').src = 'icons/profile-default.png'
      }

      showToast('Снято', 'success')
      await loadInventory()
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.className = `toast ${type} show`
      setTimeout(() => toast.classList.remove('show'), 3000)
    }

    function toggleDropdown(e) {
      e.stopPropagation()
      document.getElementById('profile-btn').classList.toggle('open')
    }

    document.addEventListener('click', function(e) {
      const profile = document.getElementById('profile-btn')
      if (profile && !profile.contains(e.target)) profile.classList.remove('open')
    })

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }
async function openCasePreview(caseId) {
  const { data: items } = await client
    .from('shop_items')
    .select('*')
    .eq('case_id', caseId)

  const total = items.reduce((sum, i) => sum + (i.chance || 0), 0)

  let html = <div style="background:white;padding:20px;border-radius:10px">

  items.forEach(i => {
    const percent = ((i.chance || 0) / total * 100).toFixed(2)

    html += 
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <img src="${i.image_url}" width="40">
        <span>${percent}%</span>
      </div>
    
  })

  html += <button onclick="closeModal()">Закрыть</button></div>

  showModal(html)
}

function rollItem(items) {
  const total = items.reduce((sum, i) => sum + (i.chance || 0), 0)
  const random = Math.random() * total

  let current = 0

  for (const item of items) {
    current += item.chance || 0
    if (random <= current) return item
  }
}



async function openCase(caseId) {
  const { data: items } = await client
    .from('shop_items')
    .select('*')
    .eq('case_id', caseId)

  const win = rollItem(items)

  startRouletteAnimation(items, win)

  // добавить в инвентарь
  await client.from('owned_avatars').insert({
    user_id: currentUser.id,
    item_id: win.id,
    type: win.type
  })
}


function startRouletteAnimation(items, winItem) {
  const container = document.createElement('div')
  container.className = 'roulette'

  const track = document.createElement('div')
  track.className = 'roulette-track'

  let elements = []

  for (let i = 0; i < 40; i++) {
    elements.push(items[Math.floor(Math.random() * items.length)])
  }

  elements[32] = winItem
  track.innerHTML = elements.map(i => <img src="${i.image_url}">).join('')

  container.innerHTML = <div class="case-roulette-pointer"></div>
  container.appendChild(track)

  document.body.appendChild(container)

  setTimeout(() => {
    track.style.transform = translateX(-${32 * 110}px)
  }, 50)

  setTimeout(() => {
    showWin(winItem)
    container.remove()
  }, 3200)
}


function showWin(item) {
  showModal(
    <div style="background:white;padding:20px;border-radius:10px;text-align:center">
      <img src="${item.image_url}" width="120">
      <h2>${item.name}</h2>
      <p>${item.type === 'background' ? 'Фон' : 'Аватар'}</p>
      <button onclick="closeModal()">Закрыть</button>
    </div>
  )
}

function showModal(html) {
  const modal = document.createElement('div')
  modal.id = 'modal'
  modal.style = 
    position:fixed;inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
  
  modal.innerHTML = html
  document.body.appendChild(modal)
}

function closeModal() {
  document.getElementById('modal')?.remove()
}
    init()
  </script>
