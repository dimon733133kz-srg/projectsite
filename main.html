<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ШАПКА -->
  <header>
    <div class="logo">
      <a href="https://kvptk.edu.kz/ru" target="_blank">
        <img src="logo.png" alt="Логотип">
      </a>
    </div>

    <!-- Профиль — клик открывает/закрывает меню -->
    <div class="profile" id="profile-btn" onclick="toggleDropdown()">
      <div class="profile-icon">👤</div>
      <span class="profile-name" id="profile-name">Загрузка...</span>
      <span class="profile-arrow">▼</span>

      <div class="dropdown">
        <a href="#">⚙️ Настройки</a>
        <div class="divider"></div>
        <a href="#" class="logout" onclick="logout()">🚪 Выйти из аккаунта</a>
      </div>
    </div>
  </header>

  <!-- КОНТЕНТ (пока пустой) -->
  <main>
    <!-- Сюда потом добавим лекции, викторины и т.д. -->
  </main>

  <!-- ПОДВАЛ -->
  <footer>
    <div class="credits">
      <span>Разработчик: <span class="credit-person">Имя Фамилия 1</span></span>
      <span>Разработчик: <span class="credit-person">Имя Фамилия 2</span></span>
    </div>
    <div>© 2025 Название проекта. Все права защищены.</div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://rnijptnxsheusvxepiht.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuaWpwdG54c2hldXN2eGVwaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgyMTUsImV4cCI6MjA5MTA2NDIxNX0.TZ9u8fJXhS02UX9ulQARcr_ITV4FAOMMaboOOPZzo5w'


    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    window.onload = async () => {
      const { data: { session } } = await client.auth.getSession()

      if (!session) {
        window.location.href = 'index.html'
        return
      }

      const { data, error } = await client
        .from('profiles')
        .select('first_name, last_name')
        .eq('id', session.user.id)
        .single()

      if (error || !data) {
        window.location.href = 'index.html'
        return
      }

      document.getElementById('profile-name').textContent = data.first_name + ' ' + data.last_name
    }

    // Открыть/закрыть меню по клику
    function toggleDropdown() {
      document.getElementById('profile-btn').classList.toggle('open')
    }

    // Закрыть меню если кликнули вне его
    document.addEventListener('click', function(e) {
      const profile = document.getElementById('profile-btn')
      if (profile && !profile.contains(e.target)) {
        profile.classList.remove('open')
      }
    })

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }
  </script>

</body>
</html>
